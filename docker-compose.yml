services:

  backend:
    image: nginx:alpine
    volumes:
      - ./backend:/usr/share/nginx/html

  python_waf:
    build: ./waf
    container_name: python_waf
    depends_on:
      - backend
    environment:
      # The CLI tool passes these environment variables when starting containers.
      # The WAF app reads BACKEND_URL at runtime so we never need to edit app.py.
      - BACKEND_URL=${AEGIS_BACKEND_URL:-http://backend}
    volumes:
      - ./waf/logs:/app/logs

  proxy:
    image: nginx
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
    ports:
      # The CLI tool passes AEGIS_PORT. Defaults to 8000 if not set.
      - "${AEGIS_PORT:-8000}:80"
    depends_on:
      - python_waf
