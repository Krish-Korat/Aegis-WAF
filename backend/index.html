<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected by Aegis WAF</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 200, 150, 0.04) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(0, 120, 255, 0.04) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-3%, 2%); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 0 20px;
        }

        /* Shield icon */
        .shield {
            text-align: center;
            margin-bottom: 32px;
        }

        .shield svg {
            width: 56px;
            height: 56px;
            filter: drop-shadow(0 0 20px rgba(0, 200, 150, 0.3));
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00c896, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Login card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 36px 32px;
            backdrop-filter: blur(20px);
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #f0f0f0;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            border-color: rgba(0, 200, 150, 0.4);
            box-shadow: 0 0 0 3px rgba(0, 200, 150, 0.08);
        }

        .field input::placeholder {
            color: #444;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #00c896, #00a67d);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 6px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }

        /* Protection badge */
        .badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
            padding: 10px;
            background: rgba(0, 200, 150, 0.06);
            border: 1px solid rgba(0, 200, 150, 0.12);
            border-radius: 10px;
        }

        .badge .dot {
            width: 7px;
            height: 7px;
            background: #00c896;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 200, 150, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0, 200, 150, 0); }
        }

        .badge span {
            font-size: 12px;
            color: #00c896;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 24px;
            text-align: center;
            font-size: 11px;
            color: #333;
            letter-spacing: 0.5px;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="shield">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 7V12C3 17.55 6.84 22.74 12 24C17.16 22.74 21 17.55 21 12V7L12 2Z" 
                  fill="url(#grad)" opacity="0.15"/>
            <path d="M12 2L3 7V12C3 17.55 6.84 22.74 12 24C17.16 22.74 21 17.55 21 12V7L12 2Z" 
                  stroke="url(#grad)" stroke-width="1.5" fill="none"/>
            <path d="M9 12L11 14L15 10" stroke="#00c896" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
                <linearGradient id="grad" x1="3" y1="2" x2="21" y2="24">
                    <stop stop-color="#00c896"/>
                    <stop offset="1" stop-color="#0088ff"/>
                </linearGradient>
            </defs>
        </svg>
    </div>

    <div class="brand">
        <h1>Aegis WAF</h1>
        <p>Protected Application</p>
    </div>

    <div class="card">
        <h2>Sign In</h2>
        <form method="GET">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" autocomplete="off">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password">
            </div>
            <button class="btn" type="submit">Sign In</button>
        </form>
    </div>

    <div class="badge">
        <div class="dot"></div>
        <span>Protected by Aegis WAF</span>
    </div>
</div>

<div class="footer">
    AEGIS &middot; REVERSE PROXY WEB APPLICATION FIREWALL
</div>

</body>
</html>
